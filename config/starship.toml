# ~/.config/starship.toml

# enable a newline before the prompt
add_newline = true
command_timeout = 1000
palette = 'catppuccin_mocha'

# custom prompt format
format = """в•­в”Ђ $shellоЂ‡$os$hostname$docker$username$directory$aws$git_branch$git_status$fill$nodejs$custom$package$nix_shell 
в•°в”Ђв‰» """

# drop ugly default prompt characters
[character]
success_symbol = 'у°љ” '
error_symbol = 'оЇ¦ '

# shows the current operating system
[os]
format = '[$symbol](bold white) '
disabled = false

[os.symbols]
Windows = ' п…є'
Arch = ' у°Ј‡'
NixOS = " пЊ“"
Ubuntu = ' пЊ›'
Macos = ' у°Ђµ'

# shows the username
[username]
show_always = true
style_root = "bold red"
style_user = "bold mauve"
format = "[$user]($style) "
disabled = false

# shows the hostname
[hostname]
ssh_only = false
format = '[$hostname](bold yellow)/'
disabled = false

# shows current directory
[directory]
truncation_length = 3
truncation_symbol = 'п’‚ '
home_symbol = 'у°‹њ ~'
read_only_style = 'red'
read_only = ' пЂЈ '
format = 'at [$path]($style)[$read_only]($read_only_style) '

# shows current git branch
[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style)'
symbol = "о™ќ "
truncation_symbol = 'вЂ¦/'
style = 'bold red'

# shows current git status
[git_status]
format = '[$all_status$ahead_behind]($style) '
style = 'bold green'
conflicted = 'рџЏі'
up_to_date = ''
untracked = ' п”©'
ahead = ' в‡Ў${count}'
diverged = ' в‡•в‡Ў${ahead_count}в‡Ј${behind_count}'
behind = ' в‡Ј${count}'
stashed = ' пЈ–'
modified = ' пЃ„'
staged = '[ ++\($count\)](green)'
renamed = ' иҐЃ'
deleted = ' пЂ”'

# shown when inside a nix-shell environment
[nix_shell]
impure_msg = '[impure](bold red)'
pure_msg = '[pure](bold green)'
format = '[ пЊ“  $state](bold blue) '

# shows current nodejs
[nodejs]
format = '[$symbol ($version )]($style)'
symbol = "у°Ћ™"
not_capable_style = "bold red"

[docker_context]
format = 'via [о™ђ $context](blue bold)'


# shows the currently active shell
[shell]
powershell_indicator = 'п‘ _'
unknown_indicator = 'mystery shell'
bash_indicator = 'оЇЉ'
zsh_indicator = 'оЇЉ'
cmd_indicator = 'оЇ„'
style = 'bold'
disabled = false

# shows the current aws profile and region
[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = false
style = 'bold blue'
symbol = "оЊЅ "

[fill]
symbol = ' '

# Detect Angular version from package.json
[custom.angular]
command = "rg --no-heading --no-line-number '\"@angular/core\":' package.json | sed 's/.*@angular\\/core\": \"//;s/\".*//'"
when = "test -f package.json && rg -q '\"@angular/core\":' package.json"
format = " [у°љї $output](red)"
ignore_timeout = true

# Detect Vue version from package.json
[custom.vue]
command = "rg --no-heading --no-line-number '\"vue\":' package.json | sed 's/.*\"vue\": \"//;s/\".*//'"
when = "test -f package.json && rg -q '\"vue\":' package.json"
format = " [у°№­ $output](blue)"
ignore_timeout = true

# Detect Vuetify version from package.json
[custom.vuetify]
command = "rg --no-heading --no-line-number '\"vuetify\":' package.json | sed 's/.*\"vuetify\": \"//;s/\".*//'"
when = "test -f package.json && rg -q '\"vuetify\":' package.json"
format = " [ољ  $output](green)"
ignore_timeout = true

# Detect React version from package.json
[custom.react]
command = "rg --no-heading --no-line-number '\"react\":' package.json | sed 's/.*\"react\": \"[~^]*//;s/\".*//'"
when = "test -f package.json && rg -q '\"react\":' package.json"
format = " [оћє $output](cyan)"
ignore_timeout = true

# Detect Next.js version from package.json
[custom.nextjs]
command = "rg --no-heading --no-line-number '\"next\":' package.json | sed 's/.*\"next\": \"[~^]*//;s/\".*//'"
when = "test -f package.json && rg -q '\"next\":' package.json"
format = " [о ѕ $output](magenta)"
ignore_timeout = true

# Detect express.js version from package.json
[custom.express]
command = "rg --no-heading --no-line-number '\"express\":' package.json | sed 's/.*\"express\": \"[~^]*//;s/\".*//'"
when = "test -f package.json && rg -q '\"express\":' package.json"
format = " [оџ“ $output](white)"
ignore_timeout = true

