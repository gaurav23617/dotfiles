# ~/.config/starship.toml

# enable a newline before the prompt
add_newline = true
command_timeout = 1000
palette = 'catppuccin_mocha'

# custom prompt format
format = """‚ï≠‚îÄ $shellÓÄá$os$hostname$docker$username$directory$aws$git_branch$git_status$fill$lua$nodejs$custom$package$nix 
‚ï∞‚îÄ‚âª """

# drop ugly default prompt characters
[character]
success_symbol = 'Û∞öî '
error_symbol = 'ÓØ¶ '

# shows the current operating system
[os]
format = '[$symbol](bold white) '
disabled = false

[os.symbols]
Windows = ' ÔÖ∫'
Arch = ' Û∞£á'
NixOS = " Ôåì"
Ubuntu = ' Ôåõ'
Macos = ' Û∞Äµ'

# shows the username
[username]
show_always = true
style_root = "bold red"
style_user = "bold mauve"
format = "[$user]($style) "
disabled = false

# shows the hostname
[hostname]
ssh_only = false
format = '[$hostname](bold yellow)/'
disabled = false

# shows current directory
[directory]
truncation_length = 3
truncation_symbol = 'ÔíÇ '
home_symbol = 'Û∞ãú ~'
read_only_style = 'red'
read_only = ' ÔÄ£ '
format = 'at [$path]($style)[$read_only]($read_only_style) '

# shows current git branch
[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style)'
symbol = "Óôù "
truncation_symbol = '‚Ä¶/'
style = 'bold red'

# shows current git status
[git_status]
format = '[$all_status$ahead_behind]($style) '
style = 'bold green'
conflicted = 'üè≥'
up_to_date = ''
untracked = ' Ôî©'
ahead = ' ‚á°${count}'
diverged = ' ‚áï‚á°${ahead_count}‚á£${behind_count}'
behind = ' ‚á£${count}'
stashed = ' Ô£ñ'
modified = ' ÔÅÑ'
staged = '[ ++\($count\)](green)'
renamed = ' Ë•Å'
deleted = ' ÔÄî'

# shows current nodejs
[nodejs]
format = '[$symbol ($version )]($style)'
symbol = "Û∞éô"
not_capable_style = "bold red"

[docker_context]
format = 'via [Óôê $context](blue bold)'

# shows the currently installed lua version
[lua]
format = '[ ÓòÝ $version](bold blue)'

# shows the currently active shell
[shell]
powershell_indicator = 'ÔëÝ_'
unknown_indicator = 'mystery shell'
bash_indicator = 'ÓØä'
zsh_indicator = 'ÓØä'
cmd_indicator = 'ÓØÑ'
style = 'bold'
disabled = false

# shows the current aws profile and region
[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = false
style = 'bold blue'
symbol = "ÓåΩ "

[fill]
symbol = ' '

# Detect Angular version from package.json
[custom.angular]
command = "rg --no-heading --no-line-number '\"@angular/core\":' package.json | sed 's/.*@angular\\/core\": \"//;s/\".*//'"
when = "test -f package.json && rg -q '\"@angular/core\":' package.json"
format = " [Û∞öø $output](red)"
ignore_timeout = true

# Detect Vue version from package.json
[custom.vue]
command = "rg --no-heading --no-line-number '\"vue\":' package.json | sed 's/.*\"vue\": \"//;s/\".*//'"
when = "test -f package.json && rg -q '\"vue\":' package.json"
format = " [Û∞π≠ $output](blue)"
ignore_timeout = true

# Detect Vuetify version from package.json
[custom.vuetify]
command = "rg --no-heading --no-line-number '\"vuetify\":' package.json | sed 's/.*\"vuetify\": \"//;s/\".*//'"
when = "test -f package.json && rg -q '\"vuetify\":' package.json"
format = " [ÓöÝ $output](green)"
ignore_timeout = true

# Detect React version from package.json
[custom.react]
command = "rg --no-heading --no-line-number '\"react\":' package.json | sed 's/.*\"react\": \"[~^]*//;s/\".*//'"
when = "test -f package.json && rg -q '\"react\":' package.json"
format = " [Óû∫ $output](cyan)"
ignore_timeout = true

# Detect Next.js version from package.json
[custom.nextjs]
command = "rg --no-heading --no-line-number '\"next\":' package.json | sed 's/.*\"next\": \"[~^]*//;s/\".*//'"
when = "test -f package.json && rg -q '\"next\":' package.json"
format = " [ÓÝæ $output](magenta)"
ignore_timeout = true

# Detect express.js version from package.json
[custom.express]
command = "rg --no-heading --no-line-number '\"express\":' package.json | sed 's/.*\"express\": \"[~^]*//;s/\".*//'"
when = "test -f package.json && rg -q '\"express\":' package.json"
format = " [Óüì $output](white)"
ignore_timeout = true

